<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark green badge background -->
  <rect width="32" height="32" rx="7" fill="#1b4332"/>

  <!-- Sky -->
  <rect x="2" y="2" width="28" height="27" rx="5" fill="#74c69d"/>

  <!-- Sun -->
  <circle cx="26" cy="8" r="3" fill="#ffd166"/>

  <!-- Back mountain (muted green) -->
  <polygon points="14,29 27,11 32,29" fill="#52b788"/>

  <!-- Main mountain (white) -->
  <polygon points="0,29 14,4 27,29" fill="white"/>

  <!-- Snow cap -->
  <polygon points="10,13 14,4 18,13" fill="#d8f3dc"/>

  <!-- Ground strip (thin) -->
  <rect x="0" y="29" width="32" height="3" fill="#1b4332"/>

  <!-- Pine trees -->
  <polygon points="3,29 6.5,21 10,29" fill="#40916c"/>
  <polygon points="22,29 25.5,22 29,29" fill="#40916c"/>
</svg>
